<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการการเข้าเรียน - โรงเรียนบ้านโหล๊ะหาร</title>
    
    <link rel="stylesheet" href="style.css">

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
</head>
<body>
    <div class="animated-bg">
        <div class="floating-shape"></div>
        <div class="floating-shape"></div>
        <div class="floating-shape"></div>
        <div class="floating-shape"></div>
    </div>

    <div id="loginSection" class="login-container">
        <div class="login-box">
            <div class="school-logo">🎓</div>
            <h1 class="login-title">ระบบจัดการการเข้าเรียน</h1>
            <p class="login-subtitle">โรงเรียนบ้านโหล๊ะหาร</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">ชื่อผู้ใช้:</label>
                    <input type="text" id="username" class="form-control" placeholder="กรอกชื่อผู้ใช้" required>
                </div>
                
                <div class="form-group">
                    <label for="password">รหัสผ่าน:</label>
                    <input type="password" id="password" class="form-control" placeholder="กรอกรหัสผ่าน" required>
                </div>
                
                <div class="form-group">
                    <label for="role">บทบาท:</label>
                    <select id="role" class="form-control" required>
                        <option value="">เลือกบทบาท</option>
                        <option value="admin">👑 ผู้ดูแลระบบ</option>
                        <option value="teacher">👨‍🏫 ครู</option>
                        <option value="student">🎓 นักเรียน</option>
                    </select>
                </div>
                
                <button type="submit" class="btn-primary" id="loginButton">
                    <span id="loginText">เข้าสู่ระบบ</span>
                    <span id="loginSpinner" class="loading-spinner hidden"></span>
                </button>
            </form>
        </div>
    </div>

    <div id="dashboardSection" class="dashboard">
        <nav class="navbar">
            <div class="navbar-content">
                <div class="navbar-brand">
                    <div class="navbar-logo">🎓</div>
                    <div class="navbar-title">โรงเรียนบ้านโหล๊ะหาร</div>
                </div>
                <div class="navbar-user">
                    <div class="user-info">
                        <div class="user-name" id="userName">ผู้ใช้</div>
                        <div class="user-role" id="userRole">บทบาท</div>
                    </div>
                    <button class="btn-logout" onclick="logout()">🚪 ออกจากระบบ</button>
                </div>
            </div>
        </nav>

        <div class="main-content">
            <div class="page-header">
                <h1 class="page-title" id="pageTitle">แดชบอร์ด</h1>
                <p class="page-subtitle" id="pageSubtitle">ภาพรวมระบบจัดการการเข้าเรียน</p>
            </div>

            <div class="nav-tabs" id="navTabs">
                </div>

            <div id="tabContent">
                </div>
        </div>
    </div>

    <div id="userModal" class="modal">
        <div class="modal-content" style="max-height:80vh; overflow-y:auto;">
            <div class="modal-header">
                <h2 class="modal-title" id="userModalTitle">เพิ่มผู้ใช้ใหม่</h2>
                <button class="close-btn" onclick="closeModal('userModal')">&times;</button>
            </div>
            <form id="userForm">
                <div class="form-group">
                    <label for="newUsername">ชื่อผู้ใช้:</label>
                    <input type="text" id="newUsername" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="newName">ชื่อ-นามสกุล:</label>
                    <input type="text" id="newName" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="newEmail">อีเมล:</label>
                    <input type="email" id="newEmail" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="newRole">บทบาท:</label>
                    <select id="newRole" class="form-control" required onchange="handleRoleChange()">
                        <option value="">เลือกบทบาท</option>
                        <option value="admin">ผู้ดูแลระบบ</option>
                        <option value="teacher">ครู</option>
                        <option value="student">นักเรียน</option>
                    </select>
                </div>
                <div id="teacherFields" class="hidden">
                    <div class="form-group">
                        <label for="newSubjects">วิชาที่สอน:</label>
                        <input type="text" id="newSubjects" class="form-control" placeholder="แยกด้วยเครื่องหมายจุลภาค">
                    </div>
                </div>
                <div id="studentFields" class="hidden">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="newClass">ชั้นเรียน:</label>
                            <select id="newClass" class="form-control">
                                <option value="">เลือกชั้นเรียน</option>
                                <option value="ม.1/1">ม.1/1</option>
                                <option value="ม.1/2">ม.1/2</option>
                                <option value="ม.1/3">ม.1/3</option>
                                <option value="ม.2/1">ม.2/1</option>
                                <option value="ม.2/2">ม.2/2</option>
                                <option value="ม.2/3">ม.2/3</option>
                                <option value="ม.3/1">ม.3/1</option>
                                <option value="ม.3/2">ม.3/2</option>
                                <option value="ม.3/3">ม.3/3</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="newStudentId">รหัสนักเรียน:</label>
                            <input type="text" id="newStudentId" class="form-control">
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label for="newPassword">รหัสผ่าน:</label>
                    <input type="password" id="newPassword" class="form-control" required>
                </div>
                <div class="form-row">
                    <button type="submit" class="btn btn-success">💾 บันทึก</button>
                    <button type="button" class="btn btn-secondary" onclick="closeModal('userModal')">❌ ยกเลิก</button>
                </div>
            </form>
        </div>
    </div>

    <div id="subjectModal" class="modal">
        <div class="modal-content" style="max-height:80vh; overflow-y:auto;">
            <div class="modal-header">
                <h2 class="modal-title" id="subjectModalTitle">เพิ่มวิชาใหม่</h2>
                <button class="close-btn" onclick="closeModal('subjectModal')">&times;</button>
            </div>
            <form id="subjectForm">
                <div class="form-group">
                    <label for="subjectName">ชื่อวิชา:</label>
                    <input type="text" id="subjectName" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="subjectTeacher">ครูผู้สอน:</label>
                    <select id="subjectTeacher" class="form-control" required>
                        <option value="">เลือกครูผู้สอน</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="subjectClass">ชั้นเรียน:</label>
                    <select id="subjectClass" class="form-control" required>
                        <option value="">เลือกชั้นเรียน</option>
                        <option value="ม.1/1">ม.1/1</option>
                        <option value="ม.1/2">ม.1/2</option>
                        <option value="ม.1/3">ม.1/3</option>
                        <option value="ม.2/1">ม.2/1</option>
                        <option value="ม.2/2">ม.2/2</option>
                        <option value="ม.2/3">ม.2/3</option>
                        <option value="ม.3/1">ม.3/1</option>
                        <option value="ม.3/2">ม.3/2</option>
                        <option value="ม.3/3">ม.3/3</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="subjectCredits">หน่วยกิต:</label>
                    <input type="number" id="subjectCredits" class="form-control" min="1" max="5" required>
                </div>
                <div class="form-group">
                    <label for="subjectYear">ปีการศึกษา:</label>
                    <input type="text" id="subjectYear" class="form-control" placeholder="กรอกปีการศึกษา เช่น 2568" required>
                </div>
                <div class="form-row">
                    <button type="submit" class="btn btn-success">💾 บันทึก</button>
                    <button type="button" class="btn btn-secondary" onclick="closeModal('subjectModal')">❌ ยกเลิก</button>
                </div>
            </form>
        </div>
    </div>

    <footer style="text-align:center; padding:20px; font-size:14px; color:#555; border-top:1px solid #ccc; margin-top:30px;">
        &copy; Developed by Information Technology Department, Banlohan School
    </footer>

    <script src="script.js"></script>
</body>
</html>
